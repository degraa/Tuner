<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>D Standard Tuner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  overflow: hidden;
  background: #0a0a0a;
  color: #e8e0d0;
  font-family: Georgia, serif;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-around;
  padding: 16px 20px;
}
h1 { font-size: 10px; letter-spacing: 0.4em; color: #c8a96e; text-transform: uppercase; }
#note { font-size: 80px; font-weight: bold; color: #333; line-height: 1; }
#info { font-size: 13px; color: #888; text-align: center; height: 18px; }
.meter { width: 280px; height: 4px; background: #222; border-radius: 2px; position: relative; }
.meter::before { content:''; position:absolute; left:50%; top:-4px; width:1px; height:12px; background:#c8a96e; opacity:0.3; }
#needle { position:absolute; top:50%; left:50%; width:14px; height:14px; background:#c8a96e; border-radius:50%; transform:translate(-50%,-50%); transition:left 0.1s; }
.strings { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; width:100%; max-width:320px; }
.str { background:#111; border:1px solid #2a2a2a; border-radius:6px; padding:10px 4px; text-align:center; cursor:pointer; }
.str.active { border-color:#c8a96e; }
.str.intune { border-color:#4caf87; }
.str-note { font-size:16px; font-weight:bold; color:#555; display:block; }
.str.active .str-note { color:#c8a96e; }
.str.intune .str-note { color:#4caf87; }
.str-num { font-size:9px; color:#333; display:block; }
#mic { width:56px; height:56px; border-radius:50%; border:1px solid #c8a96e; background:#111; color:#c8a96e; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
#mic.on { background:#c8a96e; color:#000; }
#status { font-size:11px; color:#555; font-style:italic; }
#log { font-size:10px; color:#c8a96e; text-align:center; height:14px; }
</style>
</head>
<body>

<h1>D Standard Tuner</h1>
<div id="note">—</div>
<div id="info">&nbsp;</div>
<div class="meter"><div id="needle"></div></div>
<div class="strings" id="strings"></div>
<div id="mic">🎙</div>
<div id="status">tap to listen</div>
<div id="log">&nbsp;</div>

<script>
var STRINGS=[{note:'D',n:6,freq:73.42},{note:'G',n:5,freq:98},{note:'C',n:4,freq:130.81},{note:'F',n:3,freq:174.61},{note:'A',n:2,freq:220},{note:'D',n:1,freq:293.66}];
var NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
var selected=-1,listening=false,ctx,analyser,source,stream,raf;

var grid=document.getElementById('strings');
STRINGS.forEach(function(s,i){
  var d=document.createElement('div');
  d.className='str';
  d.innerHTML='<span class="str-note">'+s.note+'</span><span class="str-num">'+s.n+'</span>';
  d.addEventListener('click',function(){
    selected=selected===i?-1:i;
    document.querySelectorAll('.str').forEach(function(b,j){b.classList.toggle('active',j===selected);if(j!==selected)b.classList.remove('intune');});
  });
  grid.appendChild(d);
});

document.getElementById('mic').addEventListener('click',function(){
  if(listening) stopMic(); else startMic();
});

function startMic(){
  document.getElementById('status').textContent='requesting...';
  if(!navigator.mediaDevices){document.getElementById('log').textContent='no mic API';return;}
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){
    stream=s;
    ctx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=ctx.createAnalyser();
    analyser.fftSize=8192;
    source=ctx.createMediaStreamSource(stream);
    source.connect(analyser);
    listening=true;
    document.getElementById('mic').classList.add('on');
    document.getElementById('status').textContent='listening...';
    document.getElementById('log').textContent='\u00a0';
    loop();
  }).catch(function(e){
    document.getElementById('log').textContent=e.name;
    document.getElementById('status').textContent='mic error';
  });
}

function stopMic(){
  listening=false;
  if(raf)cancelAnimationFrame(raf);
  if(source){try{source.disconnect();}catch(e){}}
  if(stream)stream.getTracks().forEach(function(t){t.stop();});
  if(ctx){try{ctx.close();}catch(e){}}
  document.getElementById('mic').classList.remove('on');
  document.getElementById('status').textContent='tap to listen';
  document.getElementById('note').textContent='—';
  document.getElementById('note').style.color='#333';
  document.getElementById('info').innerHTML='&nbsp;';
  document.getElementById('needle').style.left='50%';
}

function getPitch(buf,rate){
  var H=Math.floor(buf.length/2),rms=0;
  for(var i=0;i<buf.length;i++)rms+=buf[i]*buf[i];
  if(Math.sqrt(rms/buf.length)<0.01)return -1;
  var best=-1,bv=0,last=1,found=false;
  for(var o=1;o<H;o++){
    var c=0;for(var j=0;j<H;j++)c+=Math.abs(buf[j]-buf[j+o]);
    c=1-c/H;
    if(c>0.9&&c>last){found=true;if(c>bv){bv=c;best=o;}}else if(found)break;
    last=c;
  }
  return(best===-1||bv<0.9)?-1:rate/best;
}

function loop(){
  if(!listening)return;
  raf=requestAnimationFrame(loop);
  var buf=new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  var freq=getPitch(buf,ctx.sampleRate);
  var ne=document.getElementById('note');
  if(freq<60||freq>370){ne.textContent='—';ne.style.color='#333';document.getElementById('info').innerHTML='&nbsp;';document.getElementById('needle').style.left='50%';return;}
  var si=0,bd=Infinity;
  if(selected>=0)si=selected;
  else STRINGS.forEach(function(s,i){var d=Math.abs(Math.log2(freq/s.freq));if(d<bd){bd=d;si=i;}});
  var cents=1200*Math.log2(freq/STRINGS[si].freq);
  var clamped=Math.max(-50,Math.min(50,cents));
  var inTune=Math.abs(cents)<8;
  var midi=Math.round(12*Math.log2(freq/440))+69;
  ne.textContent=NOTES[((midi%12)+12)%12];
  ne.style.color=inTune?'#4caf87':'#e8e0d0';
  document.getElementById('info').textContent=(inTune?'✦ in tune ✦':(cents>0?'+':'')+Math.round(cents)+'¢')+' · '+freq.toFixed(1)+' Hz';
  document.getElementById('needle').style.left=(50+clamped)+'%';
  document.querySelectorAll('.str').forEach(function(b,i){var a=selected<0?i===si:i===selected;b.classList.toggle('active',a&&!inTune);b.classList.toggle('intune',a&&inTune);});
}
</script>

</body>
</html>
