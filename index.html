<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>D Standard Tuner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: #0a0a0a;
color: #e8e0d0;
font-family: Georgia, serif;
height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: space-between;
padding: 40px 20px 40px;
overflow: hidden;
}

h1 {
font-size: 12px;
letter-spacing: 0.4em;
color: #c8a96e;
text-transform: uppercase;
text-align: center;
}

#note {
font-size: 100px;
font-weight: bold;
text-align: center;
color: #333;
line-height: 1;
transition: color 0.1s;
}

#cents {
font-size: 16px;
text-align: center;
color: #888;
height: 24px;
}

#freq {
font-size: 13px;
text-align: center;
color: #555;
height: 20px;
}

.meter {
width: 100%;
max-width: 300px;
height: 4px;
background: #222;
border-radius: 2px;
position: relative;
}
.meter-center {
position: absolute;
left: 50%; top: -4px;
width: 1px; height: 12px;
background: #c8a96e;
opacity: 0.4;
}
#needle {
position: absolute;
top: 50%;
left: 50%;
width: 16px; height: 16px;
background: #c8a96e;
border-radius: 50%;
transform: translate(-50%, -50%);
transition: left 0.1s;
}

.strings {
display: grid;
grid-template-columns: repeat(6, 1fr);
gap: 8px;
width: 100%;
max-width: 340px;
}

.str {
background: #111;
border: 1px solid #333;
border-radius: 6px;
padding: 12px 4px;
text-align: center;
cursor: pointer;
transition: background 0.15s, border-color 0.15s;
}
.str:active { background: #1a1a1a; }
.str.active { border-color: #c8a96e; background: #181410; }
.str.intune { border-color: #4caf87; background: #0d1a12; }
.str-note { font-size: 18px; font-weight: bold; color: #666; display: block; }
.str.active .str-note { color: #c8a96e; }
.str.intune .str-note { color: #4caf87; }
.str-num { font-size: 10px; color: #333; display: block; margin-top: 2px; }

#mic {
width: 60px; height: 60px;
border-radius: 50%;
border: 1px solid #333;
background: #111;
color: #c8a96e;
font-size: 24px;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.2s;
}
#mic:active { background: #1a1a1a; }
#mic.on {
border-color: #c8a96e;
background: #181410;
box-shadow: 0 0 20px rgba(200,169,110,0.2);
}

#status {
font-size: 11px;
color: #444;
text-align: center;
font-style: italic;
}
</style>

</head>
<body>

<h1>D Standard Tuner</h1>

<div id="note">—</div>
<div id="cents"></div>
<div id="freq"></div>

<div class="meter">
  <div class="meter-center"></div>
  <div id="needle"></div>
</div>

<div class="strings" id="strings"></div>

<div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
  <div id="mic">🎙</div>
  <div id="status">tap to listen</div>
</div>

<script>
var STRINGS = [
  { note:'D', n:6, freq:73.42 },
  { note:'G', n:5, freq:98.00 },
  { note:'C', n:4, freq:130.81 },
  { note:'F', n:3, freq:174.61 },
  { note:'A', n:2, freq:220.00 },
  { note:'D', n:1, freq:293.66 }
];

var NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
var selected = -1;
var listening = false;
var ctx, analyser, source, stream, raf;

// Build string buttons
var grid = document.getElementById('strings');
STRINGS.forEach(function(s, i) {
  var d = document.createElement('div');
  d.className = 'str';
  d.id = 'str' + i;
  d.innerHTML = '<span class="str-note">' + s.note + '</span><span class="str-num">' + s.n + '</span>';
  d.addEventListener('click', function() {
    selected = (selected === i) ? -1 : i;
    document.querySelectorAll('.str').forEach(function(b, j) {
      b.classList.toggle('active', j === selected);
      if (j !== selected) b.classList.remove('intune');
    });
  });
  grid.appendChild(d);
});

// Mic button
document.getElementById('mic').addEventListener('click', function() {
  if (listening) stopMic(); else startMic();
});

function startMic() {
  if (!navigator.mediaDevices) {
    document.getElementById('status').textContent = 'no mic support';
    return;
  }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(s) {
    stream = s;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = ctx.createAnalyser();
    analyser.fftSize = 8192;
    source = ctx.createMediaStreamSource(stream);
    source.connect(analyser);
    listening = true;
    document.getElementById('mic').classList.add('on');
    document.getElementById('status').textContent = 'listening...';
    loop();
  }).catch(function() {
    document.getElementById('status').textContent = 'mic denied';
  });
}

function stopMic() {
  listening = false;
  if (raf) cancelAnimationFrame(raf);
  if (source) source.disconnect();
  if (stream) stream.getTracks().forEach(function(t) { t.stop(); });
  if (ctx) ctx.close();
  document.getElementById('mic').classList.remove('on');
  document.getElementById('status').textContent = 'tap to listen';
  document.getElementById('note').textContent = '—';
  document.getElementById('note').style.color = '#333';
  document.getElementById('cents').textContent = '';
  document.getElementById('freq').textContent = '';
  document.getElementById('needle').style.left = '50%';
}

function getPitch(buf, rate) {
  var SIZE = buf.length;
  var HALF = Math.floor(SIZE / 2);
  var rms = 0;
  for (var i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / SIZE);
  if (rms < 0.01) return -1;

  var best = -1, bestVal = 0, last = 1, found = false;
  for (var offset = 1; offset < HALF; offset++) {
    var c = 0;
    for (var j = 0; j < HALF; j++) c += Math.abs(buf[j] - buf[j + offset]);
    c = 1 - c / HALF;
    if (c > 0.9 && c > last) {
      found = true;
      if (c > bestVal) { bestVal = c; best = offset; }
    } else if (found) break;
    last = c;
  }
  if (best === -1 || bestVal < 0.9) return -1;
  return rate / best;
}

function loop() {
  if (!listening) return;
  raf = requestAnimationFrame(loop);
  var buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  var freq = getPitch(buf, ctx.sampleRate);
  if (freq < 60 || freq > 370) {
    document.getElementById('note').textContent = '—';
    document.getElementById('note').style.color = '#333';
    document.getElementById('cents').textContent = '';
    document.getElementById('freq').textContent = '';
    document.getElementById('needle').style.left = '50%';
    return;
  }

  // Find closest string
  var si = 0, bestD = Infinity;
  if (selected >= 0) {
    si = selected;
  } else {
    STRINGS.forEach(function(s, i) {
      var d = Math.abs(Math.log2(freq / s.freq));
      if (d < bestD) { bestD = d; si = i; }
    });
  }

  var cents = 1200 * Math.log2(freq / STRINGS[si].freq);
  var clamped = Math.max(-50, Math.min(50, cents));
  var inTune = Math.abs(cents) < 8;

  var midi = Math.round(12 * Math.log2(freq / 440)) + 69;
  var noteName = NOTES[((midi % 12) + 12) % 12];

  document.getElementById('note').textContent = noteName;
  document.getElementById('note').style.color = inTune ? '#4caf87' : '#e8e0d0';
  document.getElementById('cents').textContent = inTune ? '✦ in tune ✦' : ((cents > 0 ? '+' : '') + Math.round(cents) + '¢');
  document.getElementById('cents').style.color = inTune ? '#4caf87' : '#c8a96e';
  document.getElementById('freq').textContent = freq.toFixed(1) + ' Hz';
  document.getElementById('needle').style.left = (50 + clamped) + '%';

  document.querySelectorAll('.str').forEach(function(b, i) {
    var active = selected < 0 ? i === si : i === selected;
    b.classList.toggle('active', active && !inTune);
    b.classList.toggle('intune', active && inTune);
  });
}
</script>

</body>
</html>
